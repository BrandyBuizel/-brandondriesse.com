    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.1/vanilla-tilt.min.js"></script>
</head>
<body>
	<!--NEWGROUNDS RALLY TCG-->
    <div class="container">
        <img src="../../newgrounds/rally/images/iu_1607662_7061501.webp" 
            id="T-Bot" class="sticky" alt="T-Bot" width="40%" />
    <div class="box blue">
        <h2 class="name">Lucky Boy</h2>
        <a href="" class="buy">Activate</a>
        <div class="circle"></div>
        <img class="product character-frame" src="../../newgrounds/rally/images/characters/lucky boy.png" />
    </div>
  	<!-- <embed type="text/html" src="./_card.html"></embed> -->
    <script>
        VanillaTilt.init(document.querySelectorAll(".box"), {
            max: 15,
            speed: 300,
            easing: "cubic-bezier(.03,.98,.52,.99)",
            scale: 1.05,
        });
    </script>
    <script>
        const card = document.querySelector(".card");

        const updatePointerPosition = ({ x, y }) => {
            card.classList.remove('rotate');
            const rect = card.getBoundingClientRect();
            const hw = rect.width / 2;
            const hh = rect.height / 2;
            const ratioX = (x - (rect.x + hw)) / hw;
            const ratioY = (y - (rect.y + hh)) / hh;
            card.style.setProperty("--ratio-x", ratioX);
            card.style.setProperty("--ratio-y", ratioY);
        };

        card.addEventListener("pointermove", updatePointerPosition);

        card.addEventListener("pointerleave", () => {
            card.style.setProperty("--ratio-x", 0);
            card.style.setProperty("--ratio-y", 0);
        });
    </script>
    </div>
</body>
